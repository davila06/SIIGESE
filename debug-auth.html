<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Auth - SIIGESE</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug de Autenticación - SIIGESE</h1>
        
        <div class="status info">
            <strong>Estado del LocalStorage</strong>
            <div id="localStorageStatus"></div>
        </div>

        <div class="status info">
            <strong>URLs de la Aplicación</strong>
            <ul>
                <li><a href="http://localhost:4200/" target="_blank">Frontend (localhost)</a></li>
                <li><a href="http://localhost:4200/login" target="_blank">Login Page</a></li>
                <li><a href="https://app-siinadseg-backend.yellowrock-611c8f36.eastus.azurecontainerapps.io/api" target="_blank">Backend API (Azure)</a></li>
            </ul>
        </div>

        <div>
            <h3>🔧 Acciones de Debug</h3>
            <button onclick="checkAuth()">Verificar Autenticación</button>
            <button onclick="loginMock()">Login Mock</button>
            <button onclick="clearAuth()">Limpiar Auth</button>
            <button onclick="testBackend()">Test Backend</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        function updateResults(content, type = 'info') {
            const results = document.getElementById('results');
            results.innerHTML = `<div class="status ${type}"><pre>${content}</pre></div>`;
        }

        function checkAuth() {
            const currentUser = localStorage.getItem('currentUser');
            const authToken = localStorage.getItem('authToken');
            
            let result = "=== ESTADO DE AUTENTICACIÓN ===\n\n";
            result += `Usuario en localStorage: ${currentUser ? '✅ Sí' : '❌ No'}\n`;
            result += `Token en localStorage: ${authToken ? '✅ Sí' : '❌ No'}\n\n`;
            
            if (currentUser) {
                try {
                    const user = JSON.parse(currentUser);
                    result += "Usuario parseado:\n" + JSON.stringify(user, null, 2);
                } catch (e) {
                    result += "❌ Error parseando usuario: " + e.message;
                }
            }
            
            if (authToken) {
                result += "\n\nToken: " + authToken.substring(0, 20) + "...";
            }
            
            updateResults(result, currentUser && authToken ? 'success' : 'error');
        }

        function loginMock() {
            const mockUser = {
                id: 1,
                email: 'admin@sinseg.com',
                firstName: 'Administrador',
                lastName: 'Sistema',
                roles: [{ id: 1, name: 'Admin', permissions: ['read', 'write', 'delete', 'admin'] }],
                lastLoginAt: new Date().toISOString()
            };
            
            localStorage.setItem('currentUser', JSON.stringify(mockUser));
            localStorage.setItem('authToken', 'mock-jwt-token-' + Date.now());
            
            updateResults("✅ Login mock realizado exitosamente.\n\nAhora recarga la página principal: http://localhost:4200/", 'success');
        }

        function clearAuth() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('authToken');
            updateResults("🗑️ Autenticación limpiada. La aplicación debería redirigir al login.", 'info');
        }

        async function testBackend() {
            try {
                const response = await fetch('https://app-siinadseg-backend.yellowrock-611c8f36.eastus.azurecontainerapps.io/api');
                const data = await response.text();
                updateResults(`✅ Backend responde:\nStatus: ${response.status}\nContent: ${data.substring(0, 200)}...`, 'success');
            } catch (error) {
                updateResults(`❌ Error conectando al backend:\n${error.message}`, 'error');
            }
        }

        // Verificar estado inicial
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            
            // Actualizar info de localStorage
            const status = document.getElementById('localStorageStatus');
            const currentUser = localStorage.getItem('currentUser');
            const authToken = localStorage.getItem('authToken');
            
            status.innerHTML = `
                <p>Usuario guardado: ${currentUser ? '✅ Sí' : '❌ No'}</p>
                <p>Token guardado: ${authToken ? '✅ Sí' : '❌ No'}</p>
            `;
        });
    </script>
</body>
</html>
