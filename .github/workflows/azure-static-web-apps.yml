name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - V1
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - V1

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout repository
        run: |
          git clone --depth 1 https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

      - name: Setup Node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node --version
          npm --version

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend-new

      - name: Build Angular app
        run: npm run build
        working-directory: ./frontend-new
        env:
          NODE_ENV: production

      - name: Install SWA CLI and deploy
        run: |
          npm install -g @azure/static-web-apps-cli
          swa deploy ./frontend-new/dist/frontend-new \
            --deployment-token ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }} \
            --env production

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Install SWA CLI and close PR environment
        run: |
          npm install -g @azure/static-web-apps-cli
          swa deploy \
            --deployment-token ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }} \
            --env ${{ github.event.pull_request.number }} \
            --close